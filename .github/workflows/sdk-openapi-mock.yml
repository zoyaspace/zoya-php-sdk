name: SDK OpenAPI Mock

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mock:
    name: Boot Prism Mock And Smoke Test Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Prism CLI
        run: npm install --global @stoplight/prism-cli

      - name: Start Prism mock server
        run: |
          prism mock -h 0.0.0.0 openapi/openapi.yaml >/tmp/prism.log 2>&1 &
          echo $! > /tmp/prism.pid

      - name: Wait for mock server
        run: |
          for i in $(seq 1 20); do
            if curl -fsS \
              -H 'X-Zoya-Api-Key: prism-test-token' \
              http://127.0.0.1:4010/investments >/tmp/prism.out 2>/tmp/prism.err; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/prism.err || true
          cat /tmp/prism.log || true
          exit 1

      - name: Smoke test list endpoint
        run: |
          curl -fsS \
            -H 'X-Zoya-Api-Key: prism-test-token' \
            http://127.0.0.1:4010/investments > /tmp/investments.json
          grep '"data"' /tmp/investments.json

      - name: Smoke test create endpoint
        run: |
          curl -fsS \
            -X POST \
            -H 'Content-Type: application/json' \
            -H 'X-Zoya-Api-Key: prism-test-token' \
            -d '{"contact_name":"Jan Kowalski"}' \
            http://127.0.0.1:4010/leads > /tmp/leads.json
          grep '"id"' /tmp/leads.json

      - name: Show Prism logs on failure
        if: failure()
        run: cat /tmp/prism.log

      - name: Stop Prism mock server
        if: always()
        run: |
          if [ -f /tmp/prism.pid ]; then
            kill "$(cat /tmp/prism.pid)" || true
          fi
